name: Rust + Anchor CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # - name: Check formatting
      #   run: cargo fmt --all -- --check

      # - name: Run Clippy
      #   run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --verbose

      - name: Run Rust tests
        run: cargo test --verbose

  anchor-tests:
    name: Anchor Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Solana (binary)
        run: |
          SOLANA_VERSION=${{ vars.SOLANA_CLI_VERSION || 'v1.18.18' }}

          wget https://github.com/solana-labs/solana/releases/download/$SOLANA_VERSION/solana-release-x86_64-unknown-linux-gnu.tar.bz2
          tar -xjf solana-release-x86_64-unknown-linux-gnu.tar.bz2

          echo "$PWD/solana-release/bin" >> $GITHUB_PATH

          solana --version

      - name: Setup Solana keypair
        run: |
          solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json
          solana config set --keypair ~/.config/solana/id.json

      - name: Install Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force
          ANCHOR_VERSION=${{ vars.ANCHOR_CLI_VERSION || 'latest' }}
          avm install $ANCHOR_VERSION
          avm use $ANCHOR_VERSION
          anchor --version

      - name: Anchor build
        run: anchor build

      - name: Anchor test
        run: anchor test --skip-build
