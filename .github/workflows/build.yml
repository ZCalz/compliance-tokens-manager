name: Anchor CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Rust
      - uses: dtolnay/rust-toolchain@stable

      # ✅ Install Solana (reliable GitHub release)
      - name: Install Solana
        run: |
          SOLANA_VERSION=v1.18.18

          wget -q https://github.com/solana-labs/solana/releases/download/$SOLANA_VERSION/solana-release-x86_64-unknown-linux-gnu.tar.bz2
          tar -xjf solana-release-x86_64-unknown-linux-gnu.tar.bz2

          export PATH="$PWD/solana-release/bin:$PATH"
          echo "$PWD/solana-release/bin" >> $GITHUB_PATH

          solana --version

      # Anchor via AVM
      - name: Install Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          export PATH="$HOME/.cargo/bin:$PATH"

          avm install 0.30.1
          avm use 0.30.1

          anchor --version

      # Wallet
      - name: Setup keypair
        run: |
          mkdir -p ~/.config/solana
          solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json
          solana config set --keypair ~/.config/solana/id.json

      # Test
      - name: Run tests
        run: anchor test
